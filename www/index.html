
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Master</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        #ludo-board { 
            width: 90vw; height: 90vw; max-width: 360px; max-height: 360px;
            background: #fff; border: 4px solid #333; display: grid;
            grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            position: relative;
        }
        .house { grid-column: span 6; grid-row: span 6; border: 1px solid #000; }
        .red { background: #ff3838; } .green { background: #2ecc71; }
        .yellow { background: #f1c40f; } .blue { background: #3498db; }
        .pawn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; position: absolute; transition: 0.3s; cursor: pointer; }
        #dice { width: 60px; height: 60px; background: white; color: black; border-radius: 10px; margin-top: 20px; display: flex; align-items: center; justify-content: center; font-size: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Ludo Master</h2>
    <div id="ludo-board">
        <div class="house red" style="grid-area: 1 / 1 / 7 / 7;"></div>
        <div class="house green" style="grid-area: 1 / 10 / 7 / 16;"></div>
        <div id="red-pawn" class="pawn red" style="top: 10%; left: 10%;" onclick="movePawn()"></div>
    </div>
    <div id="dice" onclick="roll()">?</div>
    <script>
        let nextRoll = null;
        function roll() {
            let res = nextRoll ? nextRoll : Math.floor(Math.random()*6)+1;
            document.getElementById('dice').innerText = res;
            nextRoll = null;
        }
        function movePawn() {
            let p = document.getElementById('red-pawn');
            p.style.left = "45%"; p.style.top = "45%"; // Example move
        }
    </script>
</body>
</html>
